# Server Configuration
server.port=${PORT:8080}

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_image_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Application Custom Properties
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.upload.original-dir=${APP_UPLOAD_ORIGINAL_DIR:./uploads/original}
app.upload.processed-dir=${APP_UPLOAD_PROCESSED_DIR:./uploads/processed}

# OpenCV Denoise Configuration (1-30, cao = mượt hơn, mặc định 10)
app.denoise.strength=10

# Async Configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=100

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Gemini Vision API
# Set environment variable GEMINI_API_KEY before running
app.gemini.enabled=${APP_GEMINI_ENABLED:true}
app.gemini.api-key=AIzaSyBi7XTzMAxlqp3vqVXNjOMEpSctpDDHuCA

# YOLOv5 (OpenCV DNN)
app.yolo.enabled=${APP_YOLO_ENABLED:true}
app.yolo.model-path=${APP_YOLO_MODEL_PATH:./src/main/resources/models/yolov5s.onnx}
app.yolo.confidence-threshold=${APP_YOLO_CONFIDENCE_THRESHOLD:0.05}
app.yolo.nms-threshold=${APP_YOLO_NMS_THRESHOLD:0.45}

# CORS (comma-separated). Example:
# APP_CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app,https://www.yourdomain.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

