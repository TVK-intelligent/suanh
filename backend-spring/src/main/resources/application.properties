# Server Configuration
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/ai_image_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Application Custom Properties
app.upload.dir=./uploads
app.upload.original-dir=./uploads/original
app.upload.processed-dir=./uploads/processed

# OpenCV Denoise Configuration (1-30, cao = mượt hơn, mặc định 10)
app.denoise.strength=10

# Async Configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=100

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Gemini Vision API
# Set environment variable GEMINI_API_KEY before running
app.gemini.enabled=true
app.gemini.api-key=AIzaSyCzz7Fk11kGGZBP0DlmS3GYtH8F679EZu8

